openapi: 3.0.3
info:
  description: Shared Film Manager service contract for DSP laboratory work.
  title: DSP Film Manager API
  version: 0.1.0
servers:
- url: /
tags:
- name: sessions
- name: public-films
- name: films
- name: reviews
- name: images
- name: realtime
paths:
  /health:
    get:
      operationId: healthGET
      responses:
        "200":
          description: Service is running
      summary: Health check
      x-eov-operation-handler: controllers/DefaultController
  /api/sessions:
    post:
      operationId: sessionsPOST
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
        x-codegen-request-body-name: loginRequest
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
          description: Authenticated user
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
      summary: Login with email and password
      tags:
      - sessions
      x-eov-operation-handler: controllers/SessionsController
  /api/sessions/current:
    delete:
      operationId: sessionsCurrentDELETE
      responses:
        "204":
          description: Logged out
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
      summary: Logout
      tags:
      - sessions
      x-eov-operation-handler: controllers/SessionsController
    get:
      operationId: sessionsCurrentGET
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
          description: Current user
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
      summary: Get current authenticated user
      tags:
      - sessions
      x-eov-operation-handler: controllers/SessionsController
  /api/users/online:
    get:
      operationId: usersOnlineGET
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/OnlineUser"
                type: array
          description: Online users
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
      security:
      - cookieAuth: []
      summary: Get current WebSocket online snapshot
      tags:
      - realtime
      x-eov-operation-handler: controllers/RealtimeController
  /api/films/public:
    get:
      operationId: filmsPublicGET
      parameters:
      - description: One-based page number.
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          minimum: 1
          type: integer
        style: form
      - description: Maximum number of resources returned in one page.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 10
          maximum: 100
          minimum: 1
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilmPage"
          description: Paginated public films
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
      summary: List public films
      tags:
      - public-films
      x-eov-operation-handler: controllers/PublicFilmsController
  /api/films/public/{filmId}:
    get:
      operationId: filmsPublicFilmIdGET
      parameters:
      - explode: false
        in: path
        name: filmId
        required: true
        schema:
          minimum: 1
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Film"
          description: Public film
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
      summary: Get a public film
      tags:
      - public-films
      x-eov-operation-handler: controllers/PublicFilmsController
  /api/films/public/{filmId}/reviews:
    get:
      operationId: filmsPublicFilmIdReviewsGET
      parameters:
      - explode: false
        in: path
        name: filmId
        required: true
        schema:
          minimum: 1
          type: integer
        style: simple
      - description: One-based page number.
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          minimum: 1
          type: integer
        style: form
      - description: Maximum number of resources returned in one page.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 10
          maximum: 100
          minimum: 1
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewPage"
          description: Paginated reviews
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
      summary: List reviews for a public film
      tags:
      - public-films
      - reviews
      x-eov-operation-handler: controllers/PublicFilmsController
  /api/films/public/{filmId}/reviews/{reviewerId}:
    get:
      operationId: filmsPublicFilmIdReviewsReviewerIdGET
      parameters:
      - explode: false
        in: path
        name: filmId
        required: true
        schema:
          minimum: 1
          type: integer
        style: simple
      - explode: false
        in: path
        name: reviewerId
        required: true
        schema:
          minimum: 1
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
          description: Review
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
      summary: Get one public review
      tags:
      - public-films
      - reviews
      x-eov-operation-handler: controllers/PublicFilmsController
  /api/films:
    get:
      operationId: filmsGET
      parameters:
      - description: One-based page number.
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          minimum: 1
          type: integer
        style: form
      - description: Maximum number of resources returned in one page.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 10
          maximum: 100
          minimum: 1
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilmPage"
          description: Paginated owned films
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
      security:
      - cookieAuth: []
      summary: List films owned by the current user
      tags:
      - films
      x-eov-operation-handler: controllers/FilmsController
    post:
      operationId: filmsPOST
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FilmInput"
        required: true
        x-codegen-request-body-name: filmInput
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Film"
          description: Created film
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
      security:
      - cookieAuth: []
      summary: Create a film
      tags:
      - films
      x-eov-operation-handler: controllers/FilmsController
  /api/films/to-review:
    get:
      operationId: filmsToReviewGET
      parameters:
      - description: One-based page number.
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          minimum: 1
          type: integer
        style: form
      - description: Maximum number of resources returned in one page.
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 10
          maximum: 100
          minimum: 1
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilmPage"
          description: Paginated films to review
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
      security:
      - cookieAuth: []
      summary: List films assigned to the current reviewer
      tags:
      - films
      - reviews
      x-eov-operation-handler: controllers/FilmsController
  /api/reviews/auto-invitations:
    post:
      operationId: reviewsAutoInvitationsPOST
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewInvitationBatch"
          description: Created review invitations
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
      security:
      - cookieAuth: []
      summary: Automatically issue review invitations for public films without invitations
      tags:
      - reviews
      x-eov-operation-handler: controllers/ReviewsController
  /api/films/{filmId}:
    delete:
      operationId: filmsFilmIdDELETE
      parameters:
      - explode: false
        in: path
        name: filmId
        required: true
        schema:
          minimum: 1
          type: integer
        style: simple
      responses:
        "204":
          description: Deleted
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
      security:
      - cookieAuth: []
      summary: Delete an owned film
      tags:
      - films
      x-eov-operation-handler: controllers/FilmsController
    get:
      operationId: filmsFilmIdGET
      parameters:
      - explode: false
        in: path
        name: filmId
        required: true
        schema:
          minimum: 1
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Film"
          description: Film
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
      security:
      - cookieAuth: []
      summary: Get an accessible film
      tags:
      - films
      x-eov-operation-handler: controllers/FilmsController
    put:
      operationId: filmsFilmIdPUT
      parameters:
      - explode: false
        in: path
        name: filmId
        required: true
        schema:
          minimum: 1
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FilmInput"
        required: true
        x-codegen-request-body-name: filmInput
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Film"
          description: Updated film
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
      security:
      - cookieAuth: []
      summary: Update an owned film without changing visibility
      tags:
      - films
      x-eov-operation-handler: controllers/FilmsController
  /api/films/{filmId}/reviews:
    post:
      operationId: filmsFilmIdReviewsPOST
      parameters:
      - explode: false
        in: path
        name: filmId
        required: true
        schema:
          minimum: 1
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInvitation"
        required: true
        x-codegen-request-body-name: reviewInvitation
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
          description: Review invitation
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
      security:
      - cookieAuth: []
      summary: Invite a reviewer to a public owned film
      tags:
      - reviews
      x-eov-operation-handler: controllers/ReviewsController
  /api/films/{filmId}/reviews/{reviewerId}:
    delete:
      operationId: filmsFilmIdReviewsReviewerIdDELETE
      parameters:
      - explode: false
        in: path
        name: filmId
        required: true
        schema:
          minimum: 1
          type: integer
        style: simple
      - explode: false
        in: path
        name: reviewerId
        required: true
        schema:
          minimum: 1
          type: integer
        style: simple
      responses:
        "204":
          description: Removed
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
      security:
      - cookieAuth: []
      summary: Remove an incomplete review invitation
      tags:
      - reviews
      x-eov-operation-handler: controllers/ReviewsController
  /api/films/{filmId}/reviews/current:
    put:
      operationId: filmsFilmIdReviewsCurrentPUT
      parameters:
      - explode: false
        in: path
        name: filmId
        required: true
        schema:
          minimum: 1
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewCompletion"
        required: true
        x-codegen-request-body-name: reviewCompletion
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
          description: Completed review
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
      security:
      - cookieAuth: []
      summary: Complete the current user's review
      tags:
      - reviews
      x-eov-operation-handler: controllers/ReviewsController
  /api/films/{filmId}/active:
    put:
      operationId: filmsFilmIdActivePUT
      parameters:
      - explode: false
        in: path
        name: filmId
        required: true
        schema:
          minimum: 1
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"
          description: Active review
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "409":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
      security:
      - cookieAuth: []
      summary: Select a public review film as active
      tags:
      - films
      - realtime
      x-eov-operation-handler: controllers/FilmsController
  /api/users/current/active-film:
    delete:
      operationId: usersCurrentActiveFilmDELETE
      responses:
        "204":
          description: Active film cleared
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
      security:
      - cookieAuth: []
      summary: Clear the current user's active film
      tags:
      - films
      - realtime
      x-eov-operation-handler: controllers/FilmsController
  /api/films/{filmId}/images:
    get:
      operationId: filmsFilmIdImagesGET
      parameters:
      - explode: false
        in: path
        name: filmId
        required: true
        schema:
          minimum: 1
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/Image"
                type: array
          description: Image metadata
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
      security:
      - cookieAuth: []
      summary: List images for a public owned/review film
      tags:
      - images
      x-eov-operation-handler: controllers/ImagesController
    post:
      operationId: filmsFilmIdImagesPOST
      parameters:
      - explode: false
        in: path
        name: filmId
        required: true
        schema:
          minimum: 1
          type: integer
        style: simple
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/filmsFilmIdImagesPOST_request"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Image"
          description: Created image metadata
        "400":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "415":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
      security:
      - cookieAuth: []
      summary: Upload an image for a public owned film
      tags:
      - images
      x-eov-operation-handler: controllers/ImagesController
  /api/films/{filmId}/images/{imageId}:
    delete:
      operationId: filmsFilmIdImagesImageIdDELETE
      parameters:
      - explode: false
        in: path
        name: filmId
        required: true
        schema:
          minimum: 1
          type: integer
        style: simple
      - explode: false
        in: path
        name: imageId
        required: true
        schema:
          minimum: 1
          type: integer
        style: simple
      responses:
        "204":
          description: Deleted
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
      security:
      - cookieAuth: []
      summary: Delete an image from a public owned film
      tags:
      - images
      x-eov-operation-handler: controllers/ImagesController
    get:
      operationId: filmsFilmIdImagesImageIdGET
      parameters:
      - explode: false
        in: path
        name: filmId
        required: true
        schema:
          minimum: 1
          type: integer
        style: simple
      - explode: false
        in: path
        name: imageId
        required: true
        schema:
          minimum: 1
          type: integer
        style: simple
      - description: Requested representation for a single image.
        explode: false
        in: header
        name: accept
        required: false
        schema:
          enum:
          - application/json
          - image/png
          - image/jpg
          - image/jpeg
          - image/gif
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Image"
            image/png:
              schema:
                format: binary
                type: string
            image/jpg:
              schema:
                format: binary
                type: string
            image/jpeg:
              schema:
                format: binary
                type: string
            image/gif:
              schema:
                format: binary
                type: string
          description: Image metadata or image bytes
        "401":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "403":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "404":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
        "406":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
          description: Error response
      security:
      - cookieAuth: []
      summary: Get image metadata or bytes using content negotiation
      tags:
      - images
      x-eov-operation-handler: controllers/ImagesController
components:
  parameters:
    FilmId:
      explode: false
      in: path
      name: filmId
      required: true
      schema:
        minimum: 1
        type: integer
      style: simple
    ReviewerId:
      explode: false
      in: path
      name: reviewerId
      required: true
      schema:
        minimum: 1
        type: integer
      style: simple
    ImageId:
      explode: false
      in: path
      name: imageId
      required: true
      schema:
        minimum: 1
        type: integer
      style: simple
    Page:
      description: One-based page number.
      explode: true
      in: query
      name: page
      required: false
      schema:
        default: 1
        minimum: 1
        type: integer
      style: form
    Limit:
      description: Maximum number of resources returned in one page.
      explode: true
      in: query
      name: limit
      required: false
      schema:
        default: 10
