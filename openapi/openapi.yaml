openapi: 3.0.3
info:
  title: DSP Film Manager API
  version: 0.1.0
  description: Shared Film Manager service contract for DSP laboratory work.
servers:
  - url: /
tags:
  - name: sessions
  - name: public-films
  - name: films
  - name: reviews
  - name: images
  - name: realtime
paths:
  /health:
    get:
      summary: Health check
      operationId: healthGET
      responses:
        '200':
          description: Service is running
  /api/sessions:
    post:
      tags: [sessions]
      summary: Login with email and password
      operationId: sessionsPOST
      requestBody:
        x-codegen-request-body-name: loginRequest
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '201':
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
  /api/sessions/current:
    get:
      tags: [sessions]
      summary: Get current authenticated user
      operationId: sessionsCurrentGET
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Error'
    delete:
      tags: [sessions]
      summary: Logout
      operationId: sessionsCurrentDELETE
      responses:
        '204':
          description: Logged out
        '401':
          $ref: '#/components/responses/Error'
  /api/users/online:
    get:
      tags: [realtime]
      security:
        - cookieAuth: []
      summary: Get current WebSocket online snapshot
      operationId: usersOnlineGET
      responses:
        '200':
          description: Online users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OnlineUser'
        '401':
          $ref: '#/components/responses/Error'
  /api/films/public:
    get:
      tags: [public-films]
      summary: List public films
      operationId: filmsPublicGET
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated public films
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilmPage'
        '400':
          $ref: '#/components/responses/Error'
  /api/films/public/{filmId}:
    get:
      tags: [public-films]
      summary: Get a public film
      operationId: filmsPublicFilmIdGET
      parameters:
        - $ref: '#/components/parameters/FilmId'
      responses:
        '200':
          description: Public film
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Film'
        '404':
          $ref: '#/components/responses/Error'
  /api/films/public/{filmId}/reviews:
    get:
      tags: [public-films, reviews]
      summary: List reviews for a public film
      operationId: filmsPublicFilmIdReviewsGET
      parameters:
        - $ref: '#/components/parameters/FilmId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated reviews
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewPage'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/films/public/{filmId}/reviews/{reviewerId}:
    get:
      tags: [public-films, reviews]
      summary: Get one public review
      operationId: filmsPublicFilmIdReviewsReviewerIdGET
      parameters:
        - $ref: '#/components/parameters/FilmId'
        - $ref: '#/components/parameters/ReviewerId'
      responses:
        '200':
          description: Review
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/films:
    get:
      tags: [films]
      security:
        - cookieAuth: []
      summary: List films owned by the current user
      operationId: filmsGET
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated owned films
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilmPage'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
    post:
      tags: [films]
      security:
        - cookieAuth: []
      summary: Create a film
      operationId: filmsPOST
      requestBody:
        x-codegen-request-body-name: filmInput
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FilmInput'
      responses:
        '201':
          description: Created film
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Film'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
  /api/films/to-review:
    get:
      tags: [films, reviews]
      security:
        - cookieAuth: []
      summary: List films assigned to the current reviewer
      operationId: filmsToReviewGET
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated films to review
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FilmPage'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
  /api/reviews/auto-invitations:
    post:
      tags: [reviews]
      security:
        - cookieAuth: []
      summary: Automatically issue review invitations for public films without invitations
      operationId: reviewsAutoInvitationsPOST
      responses:
        '201':
          description: Created review invitations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewInvitationBatch'
        '401':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/films/{filmId}:
    get:
      tags: [films]
      security:
        - cookieAuth: []
      summary: Get an accessible film
      operationId: filmsFilmIdGET
      parameters:
        - $ref: '#/components/parameters/FilmId'
      responses:
        '200':
          description: Film
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Film'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
    put:
      tags: [films]
      security:
        - cookieAuth: []
      summary: Update an owned film without changing visibility
      operationId: filmsFilmIdPUT
      parameters:
        - $ref: '#/components/parameters/FilmId'
      requestBody:
        x-codegen-request-body-name: filmInput
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FilmInput'
      responses:
        '200':
          description: Updated film
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Film'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
    delete:
      tags: [films]
      security:
        - cookieAuth: []
      summary: Delete an owned film
      operationId: filmsFilmIdDELETE
      parameters:
        - $ref: '#/components/parameters/FilmId'
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/films/{filmId}/reviews:
    post:
      tags: [reviews]
      security:
        - cookieAuth: []
      summary: Invite a reviewer to a public owned film
      operationId: filmsFilmIdReviewsPOST
      parameters:
        - $ref: '#/components/parameters/FilmId'
      requestBody:
        x-codegen-request-body-name: reviewInvitation
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewInvitation'
      responses:
        '201':
          description: Review invitation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/films/{filmId}/reviews/{reviewerId}:
    delete:
      tags: [reviews]
      security:
        - cookieAuth: []
      summary: Remove an incomplete review invitation
      operationId: filmsFilmIdReviewsReviewerIdDELETE
      parameters:
        - $ref: '#/components/parameters/FilmId'
        - $ref: '#/components/parameters/ReviewerId'
      responses:
        '204':
          description: Removed
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/films/{filmId}/reviews/current:
    put:
      tags: [reviews]
      security:
        - cookieAuth: []
      summary: Complete the current user's review
      operationId: filmsFilmIdReviewsCurrentPUT
      parameters:
        - $ref: '#/components/parameters/FilmId'
      requestBody:
        x-codegen-request-body-name: reviewCompletion
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCompletion'
      responses:
        '200':
          description: Completed review
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /api/films/{filmId}/active:
    put:
      tags: [films, realtime]
      security:
        - cookieAuth: []
      summary: Select a public review film as active
      operationId: filmsFilmIdActivePUT
      parameters:
        - $ref: '#/components/parameters/FilmId'
      responses:
        '200':
          description: Active review
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /api/users/current/active-film:
    delete:
      tags: [films, realtime]
      security:
        - cookieAuth: []
      summary: Clear the current user's active film
      operationId: usersCurrentActiveFilmDELETE
      responses:
        '204':
          description: Active film cleared
        '401':
          $ref: '#/components/responses/Error'
  /api/films/{filmId}/images:
    get:
      tags: [images]
      security:
        - cookieAuth: []
      summary: List images for a public owned/review film
      operationId: filmsFilmIdImagesGET
      parameters:
        - $ref: '#/components/parameters/FilmId'
      responses:
        '200':
          description: Image metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Image'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
    post:
      tags: [images]
      security:
        - cookieAuth: []
      summary: Upload an image for a public owned film
      operationId: filmsFilmIdImagesPOST
      parameters:
        - $ref: '#/components/parameters/FilmId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        '201':
          description: Created image metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '415':
          $ref: '#/components/responses/Error'
  /api/films/{filmId}/images/{imageId}:
    get:
      tags: [images]
      security:
        - cookieAuth: []
      summary: Get image metadata or bytes using content negotiation
      operationId: filmsFilmIdImagesImageIdGET
      parameters:
        - $ref: '#/components/parameters/FilmId'
        - $ref: '#/components/parameters/ImageId'
        - $ref: '#/components/parameters/AcceptImage'
      responses:
        '200':
          description: Image metadata or image bytes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
            image/png:
              schema:
                type: string
                format: binary
            image/jpg:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            image/gif:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '406':
          $ref: '#/components/responses/Error'
    delete:
      tags: [images]
      security:
        - cookieAuth: []
      summary: Delete an image from a public owned film
      operationId: filmsFilmIdImagesImageIdDELETE
      parameters:
        - $ref: '#/components/parameters/FilmId'
        - $ref: '#/components/parameters/ImageId'
      responses:
        '204':
          description: Deleted
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: connect-sid
  parameters:
    FilmId:
      name: filmId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    ReviewerId:
      name: reviewerId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    ImageId:
      name: imageId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    Page:
      name: page
      in: query
      required: false
      description: One-based page number.
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      required: false
      description: Maximum number of resources returned in one page.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    AcceptImage:
      name: accept
      in: header
      required: false
      description: Requested representation for a single image.
      schema:
        type: string
        enum: [application/json, image/png, image/jpg, image/jpeg, image/gif]
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
    Pagination:
      type: object
      required: [page, limit, totalItems, totalPages]
      properties:
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
        totalItems:
          type: integer
          minimum: 0
        totalPages:
          type: integer
          minimum: 0
    FilmPage:
      type: object
      required: [items, pagination, self]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Film'
        pagination:
          $ref: '#/components/schemas/Pagination'
        self:
          type: string
        next:
          type: string
          nullable: true
        prev:
          type: string
          nullable: true
    ReviewPage:
      type: object
      required: [items, pagination, self]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Review'
        pagination:
          $ref: '#/components/schemas/Pagination'
        self:
          type: string
        next:
          type: string
          nullable: true
        prev:
          type: string
          nullable: true
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 6
          maxLength: 20
    User:
      type: object
      required: [id, name, email, self]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          format: email
        self:
          type: string
    Film:
      type: object
      required: [id, title, owner, private, favorite, self]
      properties:
        id:
          type: integer
        title:
          type: string
        owner:
          type: integer
          description: Identifier of the user who created the film.
        ownerId:
          type: integer
          deprecated: true
          description: Compatibility alias for owner.
        private:
          type: boolean
          description: True when only the owner can access the film.
        public:
          type: boolean
          deprecated: true
          description: Compatibility alias equal to the inverse of private.
        watchDate:
          type: string
          nullable: true
          format: date
        rating:
          type: integer
          nullable: true
          minimum: 0
          maximum: 10
        favorite:
          type: boolean
        self:
          type: string
    FilmInput:
      type: object
      required: [title, private]
      properties:
        title:
          type: string
        private:
          type: boolean
        public:
          type: boolean
          deprecated: true
          description: Compatibility alias equal to the inverse of private.
        watchDate:
          type: string
          nullable: true
          format: date
        rating:
          type: integer
          nullable: true
          minimum: 0
          maximum: 10
        favorite:
          type: boolean
    Review:
      type: object
      required: [filmId, reviewerId, completed, active, self]
      properties:
        filmId:
          type: integer
        reviewerId:
          type: integer
        completed:
          type: boolean
        reviewDate:
          type: string
          nullable: true
          format: date
        rating:
          type: integer
          nullable: true
          minimum: 0
          maximum: 10
        review:
          type: string
          nullable: true
          maxLength: 1000
        description:
          type: string
          nullable: true
          deprecated: true
          description: Compatibility alias for review.
          maxLength: 1000
        active:
          type: boolean
        reviewer:
          $ref: '#/components/schemas/User'
        self:
          type: string
    ReviewCompletion:
      type: object
      properties:
        reviewDate:
          type: string
          format: date
        rating:
          type: integer
          minimum: 0
          maximum: 10
        review:
          type: string
          maxLength: 1000
        description:
          type: string
          deprecated: true
          description: Compatibility alias for review.
          maxLength: 1000
    ReviewInvitation:
      type: object
      required: [reviewerId]
      properties:
        reviewerId:
          type: integer
          minimum: 1
    ReviewInvitationBatch:
      type: object
      required: [items, self]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Review'
        self:
          type: string
    Image:
      type: object
      required: [id, filmId, name, mediaType, self]
      properties:
        id:
          type: integer
        filmId:
          type: integer
        name:
          type: string
        mediaType:
          type: string
          enum: [image/png, image/jpeg, image/jpg, image/gif]
        self:
          type: string
    OnlineUser:
      type: object
      required: [userId, userName]
      properties:
        userId:
          type: integer
        userName:
          type: string
        filmId:
          type: integer
          nullable: true
        filmTitle:
          type: string
          nullable: true
    WebSocketStatusMessage:
      type: object
      required: [typeMessage, userId]
      properties:
        typeMessage:
          type: string
          enum: [login, update, logout]
        userId:
          type: integer
        userName:
          type: string
        filmId:
          type: integer
          nullable: true
        filmTitle:
          type: string
          nullable: true
    MqttFilmMessage:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [active, inactive, deleted]
        userId:
          type: integer
          nullable: true
        userName:
          type: string
          nullable: true
